<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=1200,height=720"><style>
    *{box-sizing:border-box}html,body{margin:0;width:1200px;height:720px;overflow:hidden}
    body{font-family:"Avenir Next","PingFang SC",sans-serif;background:transparent}
    .wrap{width:1200px;height:720px;padding:28px;background:#17211d;border-radius:24px;color:#f5ffe8;display:grid;grid-template-columns:1fr 1fr;gap:22px}
    .cell{position:relative;border-radius:18px;overflow:hidden;background:#fff;border:1px solid rgba(245,255,232,.16)}
    img{width:100%;height:100%;object-fit:cover}
    .badge{position:absolute;left:14px;top:14px;background:#17211d;color:#d8ff62;border-radius:999px;padding:8px 12px;font-weight:800;font-size:18px}
  </style></head><body><div class="wrap">
    <div class="cell"><img src="reference_ui.png"><span class="badge">Image2 输入</span></div>
    <div class="cell"><img src="restored_ui.png"><span class="badge">Restorer 输出</span></div>
  </div></body></html>
